{% extends 'base.html' %}

{% block title %}Novo Agendamento - CarFlow{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-6">
    <!-- Header -->
    <div class="text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-r from-orange-500 to-orange-600 rounded-full mb-4">
            <i class="fas fa-calendar text-white text-2xl"></i>
        </div>
        <h1 class="text-3xl font-bold text-white">Novo Agendamento</h1>
        <p class="text-slate-400 mt-2">Preencha os dados abaixo para agendar um serviço</p>
    </div>

    <!-- Form Card -->
    <div class="bg-slate-800/50 backdrop-blur-sm border border-slate-700/50 rounded-xl p-8">
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <!-- Dados do Cliente -->
            <div class="space-y-4">
                <div class="flex items-center gap-2 mb-4">
                    <i class="fas fa-user text-orange-500"></i>
                    <h2 class="text-xl font-semibold text-white">Dados do Cliente</h2>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="cliente_nome" class="block text-sm font-medium text-slate-300 mb-2">Nome Completo</label>
                        <input type="text" id="cliente_nome" name="cliente_nome" required
                            class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white focus:outline-none focus:border-orange-500"
                            placeholder="Digite seu nome">
                    </div>
                    <div>
                        <label for="cliente_telefone" class="block text-sm font-medium text-slate-300 mb-2">Telefone</label>
                        <input type="tel" id="cliente_telefone" name="cliente_telefone" required
                            class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white focus:outline-none focus:border-orange-500"
                            placeholder="(00) 00000-0000">
                    </div>
                </div>
            </div>

            <!-- Serviço e Agendamento -->
            <div class="space-y-4">
                <div class="flex items-center gap-2 mb-4">
                    <i class="fas fa-calendar text-orange-500"></i>
                    <h2 class="text-xl font-semibold text-white">Serviço e Data</h2>
                </div>

                <div>
                    <label for="servico" class="block text-sm font-medium text-slate-300 mb-2">Selecione o Serviço</label>
                    <select id="servico" name="servico" required
                        class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white focus:outline-none focus:border-orange-500">
                        <option value="">Escolha um serviço</option>
                        {% for servico in servicos %}
                        <option value="{{ servico.id }}">{{ servico.nome }} - R$ {{ servico.preco }} ({{ servico.duracao }} min)</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="data" class="block text-sm font-medium text-slate-300 mb-2">Data do Agendamento</label>
                        <input type="date" id="data" name="data" required
                            class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white focus:outline-none focus:border-orange-500">
                    </div>
                    <div>
                        <label for="hora" class="block text-sm font-medium text-slate-300 mb-2">Horário</label>
                        <input type="time" id="hora" name="hora" required
                            class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white focus:outline-none focus:border-orange-500">
                    </div>
                </div>

                <div>
                    <label for="observacoes" class="block text-sm font-medium text-slate-300 mb-2">Observações (opcional)</label>
                    <textarea id="observacoes" name="observacoes" rows="3"
                        class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white focus:outline-none focus:border-orange-500"
                        placeholder="Informações adicionais sobre o agendamento"></textarea>
                </div>
            </div>

            <!-- Actions -->
            <div class="flex gap-4 pt-4">
                <a href="/api/app/" class="flex-1 px-6 py-3 border border-slate-600 text-slate-300 rounded-lg hover:bg-slate-700 transition text-center">
                    Cancelar
                </a>
                <button type="submit" class="flex-1 px-6 py-3 bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700 text-white rounded-lg transition">
                    Confirmar Agendamento
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
